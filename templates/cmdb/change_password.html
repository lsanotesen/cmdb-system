{% extends 'base.html' %}

{% block title %}修改密码 - 资产管理系统{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">
        <h2>🔐 修改密码</h2>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="old_password">旧密码</label>
                <input type="password" name="old_password" id="old_password" class="form-control" required placeholder="请输入旧密码">
            </div>
            
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" name="new_password" id="new_password" class="form-control" required placeholder="请输入新密码">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">确认新密码</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required placeholder="请再次输入新密码">
            </div>
            
            <div class="form-group" style="margin-top: 20px;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">修改密码</button>
            </div>
        </form>
        
        <div style="margin-top: 15px;">
            <a href="{% url 'cmdb_index' %}" class="btn btn-secondary" style="width: 100%;">返回首页</a>
        </div>
    </div>
</div>
{% endblock %}
