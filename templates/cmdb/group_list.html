{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>📊 动态资产组</h2>
        <div class="btn-group">
            <a href="{% url 'group_add' %}" class="btn btn-success">➕ 添加资产组</a>
        </div>
    </div>
    <div class="card-body">
        <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>组名称</th>
                    <th>描述</th>
                    <th>主机数量</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for group in groups %}
                <tr>
                    <td>{{ group.name }}</td>
                    <td>{{ group.desc|default:'-' }}</td>
                    <td>{{ group.serverList.count }}</td>
                    <td>
                        <button class="btn btn-sm btn-edit" data-url="{% url 'group_edit' group.id %}" onclick="location.href=this.dataset.url">编辑</button>
                        <button class="btn btn-sm btn-delete" data-url="{% url 'group_delete' group.id %}" onclick="confirmDelete(this.dataset.url)">删除</button>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">暂无数据</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function confirmDelete(url) {
    if (confirm('确定删除?')) {
        location.href = url;
    }
}
</script>
{% endblock %}
