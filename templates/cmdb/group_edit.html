{% extends 'base.html' %}

{% block content %}
<div class="panel">
    <div class="panel-header">
        <h2>编辑主机组</h2>
    </div>
    <div class="panel-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>组名称 *</label>
                <input type="text" name="name" class="form-control" value="{{ group.name }}" required>
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" name="desc" class="form-control" value="{{ group.desc }}">
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-success">保存</button>
                <a href="{% url 'group_list' %}" class="btn btn-secondary">返回</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
