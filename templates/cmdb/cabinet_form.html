{% extends 'base.html' %}

{% block title %}{% if action == 'edit' %}编辑机柜{% else %}添加机柜{% endif %} - 资产管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{% if action == 'edit' %}✏️ 编辑机柜{% else %}➕ 添加机柜{% endif %}</h2>
        <div class="btn-group">
            <a href="{% url 'cabinet_list' %}" class="btn btn-secondary">← 返回列表</a>
        </div>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>机柜名称 *</label>
                    <input type="text" name="name" class="form-control" required value="{{ cabinet.name|default:'' }}" placeholder="如: A-01">
                </div>
                <div class="form-group">
                    <label>所属机房</label>
                    <select name="idc" class="form-control">
                        <option value="">请选择</option>
                        {% for idc in idc_list %}
                        <option value="{{ idc.id }}" {% if cabinet.idc_id == idc.id %}selected{% endif %}>{{ idc.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" name="desc" class="form-control" value="{{ cabinet.desc|default:'' }}">
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-success">保存</button>
                <a href="{% url 'cabinet_list' %}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
