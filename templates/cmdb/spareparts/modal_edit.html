<div class="modal-header">
    <h5 class="modal-title">编辑备件</h5>
    <button type="button" class="close" data-dismiss="modal">&times;</button>
</div>
<div class="modal-body">
    <form id="editForm">
        <input type="hidden" name="sparepart_id" value="{{ sparepart.id }}">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label>备件资产编号（可选）</label>
                <input type="text" class="form-control" name="asset_code" value="{{ sparepart.asset_code|default:'' }}">
            </div>
            <div class="form-group col-md-6">
                <label>备件类型 *</label>
                <select class="form-control" name="type" required>
                    <option value="">请选择</option>
                    <option value="hard_drive" {% if sparepart.type == 'hard_drive' %}selected{% endif %}>硬盘</option>
                    <option value="memory" {% if sparepart.type == 'memory' %}selected{% endif %}>内存</option>
                    <option value="power_supply" {% if sparepart.type == 'power_supply' %}selected{% endif %}>电源</option>
                    <option value="fan" {% if sparepart.type == 'fan' %}selected{% endif %}>风扇</option>
                    <option value="other" {% if sparepart.type == 'other' %}selected{% endif %}>其他</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group col-md-6">
                <label>关联服务器</label>
                <select class="form-control" name="related_asset_no" id="edit_related_asset_select">
                    <option value="">请选择服务器</option>
                    {% for asset in assets %}
                    <option value="{{ asset.asset_no }}" 
                            {% if sparepart.related_asset_no == asset.asset_no %}selected{% endif %}
                            data-ip="{{ asset.ip }}" 
                            data-cabinet="{{ asset.cabinet }}">
                        {{ asset.asset_no }} - {{ asset.ip }} - {{ asset.device_model }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            {% if sparepart.status == 'available' %}
            <div class="form-group col-md-6">
                <label>分配时间</label>
                <input type="date" class="form-control" name="allocate_date" value="{{ sparepart.allocate_date|date:'Y-m-d'|default:'' }}">
            </div>
            {% else %}
            <div class="form-group col-md-6">
                <label>下架时间</label>
                <input type="date" class="form-control" name="remove_date" value="{{ sparepart.remove_date|date:'Y-m-d'|default:'' }}">
            </div>
            {% endif %}
        </div>
        <div class="form-row">
            <div class="form-group col-md-6">
                <label>IP地址</label>
                <input type="text" class="form-control" name="ip_address" id="edit_ip_address" value="{{ sparepart.ip_address|default:'' }}">
            </div>
            <div class="form-group col-md-6">
                <label>机柜位置</label>
                <input type="text" class="form-control" name="cabinet_location" id="edit_cabinet_location" value="{{ sparepart.cabinet_location|default:'' }}">
            </div>
        </div>
        {% if sparepart.status == 'failed' %}
        <div class="form-group">
            <label>故障原因</label>
            <textarea class="form-control" name="failure_reason" rows="3">{{ sparepart.failure_reason|default:'' }}</textarea>
        </div>
        {% endif %}
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
    <button type="button" class="btn btn-primary" onclick="submitEditForm()">保存</button>
</div>

<script>
// 选择服务器时自动填充IP和机柜
document.getElementById('edit_related_asset_select').addEventListener('change', function() {
    var selectedOption = this.options[this.selectedIndex];
    document.getElementById('edit_ip_address').value = selectedOption.dataset.ip || '';
    document.getElementById('edit_cabinet_location').value = selectedOption.dataset.cabinet || '';
});

// 提交编辑表单
function submitEditForm() {
    var form = document.getElementById('editForm');
    var formData = new FormData(form);
    
    fetch('{% url "spareparts_edit" sparepart.id %}', {
        method: 'POST',
        headers: { 'X-CSRFToken': getCookie('csrftoken') },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            $('#editModal').modal('hide');
            location.reload();
        } else {
            alert('保存失败: ' + data.error);
        }
    });
}

function getCookie(name) {
    var value = "; " + document.cookie;
    var parts = value.split("; " + name + "=");
    if (parts.length == 2) return parts.pop().split(";").shift();
}
</script>
