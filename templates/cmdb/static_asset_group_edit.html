{% extends 'base.html' %}

{% block content %}
<div class="panel">
    <div class="panel-header">
        <h2>编辑静态资产组</h2>
    </div>
    <div class="panel-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>组名称</label>
                <input type="text" name="name" class="form-control" value="{{ group.name }}" required>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea name="desc" class="form-control" rows="3">{{ group.desc|default:'' }}</textarea>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-success">保存</button>
                <a href="{% url 'static_asset_group_list' %}" class="btn">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
