{% extends 'base.html' %}

{% block title %}{% if action == 'edit' %}编辑机房{% else %}添加机房{% endif %} - 资产管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{% if action == 'edit' %}✏️ 编辑机房{% else %}➕ 添加机房{% endif %}</h2>
        <div class="btn-group">
            <a href="{% url 'idc_list' %}" class="btn btn-secondary">← 返回列表</a>
        </div>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>机房标识 *</label>
                    <input type="text" name="ids" class="form-control" required value="{{ idc.ids|default:'' }}" placeholder="如: IDC-BJ-01">
                </div>
                <div class="form-group">
                    <label>机房名称 *</label>
                    <input type="text" name="name" class="form-control" required value="{{ idc.name|default:'' }}" placeholder="如: 北京机房">
                </div>
                <div class="form-group">
                    <label>机房地址</label>
                    <input type="text" name="address" class="form-control" value="{{ idc.address|default:'' }}">
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-success">保存</button>
                <a href="{% url 'idc_list' %}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
