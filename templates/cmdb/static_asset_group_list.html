{% extends 'base.html' %}

{% block content %}
<div class="panel">
    <div class="panel-header">
        <h2>静态资产组列表</h2>
    </div>
    <div class="panel-body">
        <div style="margin-bottom: 20px;">
            <a href="{% url 'static_asset_group_add' %}" class="btn btn-success">+ 添加静态资产组</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>组名称</th>
                    <th>描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for group in groups %}
                <tr>
                    <td>{{ group.name }}</td>
                    <td>{{ group.desc|default:'-' }}</td>
                    <td class="actions">
                        <a href="{% url 'static_asset_group_edit' group.id %}" class="btn">编辑</a>
                        <a href="{% url 'static_asset_group_delete' group.id %}" class="btn btn-danger" onclick="return confirm('确定删除?')">删除</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">暂无数据</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
