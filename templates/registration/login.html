<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 资产管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-container {
            display: flex;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-left h1 {
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .login-left p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.8;
        }
        .login-left .features {
            margin-top: 40px;
        }
        .login-left .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .login-left .feature-item .icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-right {
            flex: 1;
            padding: 60px 50px;
        }
        .login-header {
            margin-bottom: 40px;
        }
        .login-header h2 {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #718096;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-group.has-error .form-control {
            border-color: #f56565;
        }
        .error-message {
            color: #f56565;
            font-size: 13px;
            margin-top: 5px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #718096;
            font-size: 14px;
            cursor: pointer;
        }
        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .login-left { display: none; }
            .login-right { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <h1>资产管理系统</h1>
            <p>高效、便捷的IT基础设施管理解决方案</p>
            <div class="features">
                <div class="feature-item">
                    <div class="icon">🖥️</div>
                    <span>服务器与网络设备管理</span>
                </div>
                <div class="feature-item">
                    <div class="icon">📊</div>
                    <span>实时监控与数据分析</span>
                </div>
                <div class="feature-item">
                    <div class="icon">🔒</div>
                    <span>权限控制与操作审计</span>
                </div>
                <div class="feature-item">
                    <div class="icon">💾</div>
                    <span>数据备份与恢复</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-header">
                <h2>欢迎回来</h2>
                <p>请登录您的账户继续</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}" style="background: #fed7d7; color: #742a2a; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            {% if form.errors %}
                <div class="alert alert-danger" style="background: #fed7d7; color: #742a2a; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;">
                    用户名或密码错误，请重试
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">用户名</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label for="id_password">密码</label>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="请输入密码" required>
                </div>
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" name="remember_me">
                        <span>记住我</span>
                    </label>
                </div>
                <button type="submit" class="btn-login">登 录</button>
                <input type="hidden" name="next" value="{{ next }}">
            </form>
        </div>
    </div>
</body>
</html>
